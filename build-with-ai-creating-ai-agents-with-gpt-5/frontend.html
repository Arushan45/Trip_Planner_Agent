<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trip Coach</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --accent: #f97316;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --card: #0b1220;
        --border: #1f2937;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at top, #1f2937 0%, #0f172a 45%, #020617 100%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app {
        width: 100%;
        max-width: 900px;
        background: linear-gradient(180deg, rgba(15,23,42,0.9), rgba(2,6,23,0.95));
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 30px 60px rgba(2, 6, 23, 0.6);
      }
      .title {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .subtitle {
        color: var(--muted);
        margin-top: 8px;
        margin-bottom: 20px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 18px;
        border-radius: 16px;
      }
      textarea {
        width: 100%;
        min-height: 120px;
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        font-size: 16px;
        resize: vertical;
      }
      button {
        background: var(--accent);
        color: #0b1220;
        font-weight: 700;
        border: none;
        border-radius: 12px;
        padding: 12px 18px;
        cursor: pointer;
        margin-top: 12px;
        transition: transform 120ms ease;
      }
      button:hover { transform: translateY(-1px); }
      .output {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
        min-height: 140px;
        margin-top: 14px;
        color: var(--text);
        line-height: 1.55;
      }
      .output h3 {
        margin: 16px 0 8px;
        font-size: 18px;
        color: #f8fafc;
      }
      .output p { margin: 8px 0; color: var(--text); }
      .output ul {
        margin: 8px 0 12px 18px;
        padding: 0;
      }
      .output li { margin: 6px 0; color: var(--text); }
      .badge {
        display: inline-block;
        background: rgba(249, 115, 22, 0.18);
        color: #fed7aa;
        border: 1px solid rgba(249, 115, 22, 0.4);
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .skeleton {
        background: linear-gradient(90deg, #0b1220 25%, #111827 37%, #0b1220 63%);
        background-size: 400% 100%;
        animation: shimmer 1.2s ease infinite;
        height: 14px;
        border-radius: 6px;
        margin: 8px 0;
      }
      @keyframes shimmer {
        0% { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }
      .hint {
        color: var(--muted);
        font-size: 13px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="title">Trip Coach</div>
      <div class="subtitle">Ask for weather-aware ideas and packing tips.</div>
      <div class="panel">
        <textarea id="prompt" placeholder="Example: I'm heading to Atlanta this weekend. What's the weather like and what should I pack?"></textarea>
        <button id="send">Ask Trip Coach</button>
        <div class="hint">Backend must be running at http://127.0.0.1:8000</div>
        <div id="output" class="output"></div>
      </div>
    </div>
    <script>
      const sendBtn = document.getElementById("send");
      const output = document.getElementById("output");
      const promptEl = document.getElementById("prompt");

      function renderResponse(text) {
        const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
        let html = '<div class="badge">Trip Coach</div>';
        let inList = false;

        for (const line of lines) {
          const bullet = line.match(/^[-*]\s+(.*)/);
          if (bullet) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            html += `<li>${escapeHtml(bullet[1])}</li>`;
            continue;
          }

          if (inList) {
            html += "</ul>";
            inList = false;
          }

          const heading = line.match(/^\*\*(.+)\*\*$/);
          if (heading) {
            html += `<h3>${applyInlineBold(escapeHtml(heading[1]))}</h3>`;
            continue;
          }

          html += `<p>${applyInlineBold(escapeHtml(line))}</p>`;
        }

        if (inList) {
          html += "</ul>";
        }

        output.innerHTML = html;
      }

      function escapeHtml(str) {
        return str.replace(/[&<>"']/g, (m) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[m]);
      }

      function applyInlineBold(str) {
        return str.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      }

      async function ask() {
        const prompt = promptEl.value.trim();
        if (!prompt) {
          output.textContent = "Please enter a question first.";
          return;
        }
        output.innerHTML = `
          <div class="badge">Trip Coach</div>
          <div class="skeleton" style="width: 70%;"></div>
          <div class="skeleton" style="width: 95%;"></div>
          <div class="skeleton" style="width: 85%;"></div>
        `;
        try {
          const res = await fetch("http://127.0.0.1:8000/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
          });
          if (!res.ok) {
            const errText = await res.text();
            throw new Error(errText || "Request failed.");
          }
          const data = await res.json();
          renderResponse(data.response || "No response text returned.");
        } catch (err) {
          output.textContent = `Error: ${err.message}`;
        }
      }

      sendBtn.addEventListener("click", ask);
      promptEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
          ask();
        }
      });
    </script>
  </body>
</html>
